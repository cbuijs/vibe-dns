# =============================================================================
# 1. LOGGING CONFIGURATION
# Controls output verbosity and destinations (Console, File, Syslog).
# =============================================================================
logging:
  # Sets the verbosity of logs. Lower number means more verbose output (DEBUG).
  # Options: "DEBUG", "INFO", "WARNING", "ERROR".
  # Default: "INFO"
  level: "INFO"
  
  # Enable logging to standard output (console/terminal).
  enable_console: true
  
  # If true, prepends the timestamp to console log messages.
  # Default: true
  console_timestamp: true
  
  # Enable logging to a specific file.
  enable_file: true
  
  # Path to the log file.
  file_path: "./dns_server.log"
  
  # Enable logging to the system logger (Syslog).
  enable_syslog: false
  
  # Syslog address or socket path.
  # - Local Socket (Linux/Mac): "/dev/log"
  # - Remote Server: "192.168.1.50:514"
  syslog_address: "/dev/log"
  
  # Protocol for REMOTE syslog only. Ignored for local sockets.
  # Options: "UDP", "TCP".
  syslog_protocol: "UDP"

# =============================================================================
# 2. SERVER NETWORKING
# Defines binding and listening ports.
# =============================================================================
server:
  # List of IPv4 or IPv6 addresses the server should bind listeners to.
  # - "0.0.0.0": Binds to all available IPv4 interfaces.
  # - "::": Binds to all available IPv6 interfaces.
  bind_ip: 
    - "0.0.0.0"
    - "::"

  # List of network interface names (e.g., "eth0", "wlan0"). 
  # The server resolves these to their current IPs at startup.
  bind_interfaces: []
  
  # List of ports for standard DNS UDP traffic.
  # Standard is 53. Requires root privileges.
  port_udp: [53]
  
  # List of ports for standard DNS TCP traffic.
  # Standard is 53.
  port_tcp: [53]
  
  # Enable identifying clients via EDNS Client Subnet (ECS, Option Code 8).
  # If true, the IP in the ECS header is used for policy matching, overriding the source IP.
  use_ecs: false

  # Enable identifying clients via EDNS0 MAC forwarding (Option 65001).
  # If present, this MAC is used for client group identification.
  use_edns_mac: false

# =============================================================================
# 3. UPSTREAM RESOLUTION
# Defines targets and health monitoring strategy.
# =============================================================================
upstream:
  # Monitoring Mode: How to select the active upstream server. The core forwarding
  # logic automatically tries the next available server if the current one fails to respond.
  # Options: 
  #   - "none": Disables all monitoring, uses servers in the order listed under the group.
  #             If a server fails, it switches to the next one in the static list and attempts to switch back.
  #   - "random": Selects a server randomly from the applicable group for each query.
  #   - "roundrobin": Cycles through servers sequentially based on the order listed in the group.
  #   - "fastest": Sorts by current measured latency every interval. (Default)
  #   - "failover": If the current server fails, it switches to the currently available **fastest** server, 
  #                 and attempts to switch back to the original fastest one when it recovers.
  #   - "sticky": Same as failover, but stays with the working backup until it fails. (No automatic fallback)
  #   - "loadbalance": Sorts by lowest rolling average latency.
  mode: "fastest"

  # Monitoring interval (seconds) to check upstream latency.
  monitor_interval: 60
  
  # If true, triggers a background latency check immediately when a query arrives 
  # if the cached latency data is older than monitor_interval.
  monitor_on_query: false
  
  # Domain used for latency health checks.
  test_domain: "www.google.com"

  # Bootstrap DNS servers used ONLY to resolve the hostnames of your main upstreams.
  # Used if the upstream host is a domain (e.g., 'dns.quad9.net') and no #forced_ip is provided.
  bootstrap:
    - "8.8.8.8"
    - "1.1.1.1"

  # Upstream Server Groups. Used for routing specific client policies to different sets of resolvers.
  groups:
    # This group is used if no policy specifies an upstream_group.
    Default:
      servers:
        # Standard UDP servers. Format: [protocol://IP:Port]
        - "udp://8.8.8.8:53"
        - "udp://1.1.1.1:53"
    
    # Example: Group for highly filtered queries (e.g., malware only)
    Filtered:
      servers:
        - "udp://9.9.9.9:53" # Quad9
        - "udp://208.67.222.222:53" # OpenDNS
      
# =============================================================================
# 4. CACHING & PERFORMANCE
# =============================================================================
cache:
  # Maximum number of unique DNS entries to cache in memory (0 disables).
  size: 10000
  
  # Garbage Collector interval (seconds) to clean up expired cache entries.
  gc_interval: 300
  
  # TTL (seconds) for negative answers (NXDOMAIN/NODATA).
  negative_ttl: 60
  
  # --- Prefetching ---
  # If a cached record is about to expire (less than X seconds remaining), 
  # serve it but trigger a background query to refresh it. Set to 0 to disable.
  prefetch_margin: 10
  
  # Minimum number of cache hits required before an entry qualifies for prefetching.
  # Prevents unnecessary refreshes of rarely used domains.
  prefetch_min_hits: 3

deduplication:
  # Enable request coalescing. If enabled, multiple identical requests arriving
  # almost simultaneously result in only one query being sent upstream.
  enabled: true

# =============================================================================
# 5. RATE LIMITING
# Configures DoS/Abuse protection.
# =============================================================================
rate_limit:
  enabled: true
  
  # Time window (seconds) for counting requests.
  window_seconds: 60
  
  # Subnet masks for grouping clients. Requests from IPs in the same subnet 
  # (based on the mask) count towards the same limit.
  # IPv4 /32 = Per individual IP. IPv4 /24 = Per /24 subnet.
  ipv4_mask: 24
  ipv6_mask: 64
  
  # Max UDP queries allowed in the window before forcing a TCP retry (TC Bit).
  udp_threshold: 100         
  
  # Absolute max queries (UDP+TCP) allowed before silently dropping the packet.
  total_threshold: 200       

# =============================================================================
# 6. RESPONSE MODIFICATION & BLOCKING BEHAVIOR
# =============================================================================
response:
  # Enable Round Robin. Shuffles the order of A and AAAA records in the answer 
  # to provide basic load balancing across multiple IPs.
  round_robin_enabled: false
  
  # CNAME Flattening. Recursively resolves CNAME chains and replaces them with 
  # the final A/AAAA record, applying the minimum TTL from the chain.
  cname_collapse: true
  
  # Response Minimization. Strips Authority and Additional sections.
  minimize_response: false
  
  # Enforced TTL Bounds (Seconds).
  min_ttl: 60      # Minimum TTL for any cached record (boosts short TTLs).
  max_ttl: 86400   # Maximum TTL for any cached record (caps stale data).
  
  # TTL Sync Mode. Synchronizes TTLs of multiple records in a response.
  # Options: 
  #   - "none": (Default) No synchronization, applies min/max clamping only.
  #   - "lowest": Sets all TTLs to the lowest TTL found. (Safest for expiry)
  #   - "highest": Sets all TTLs to the highest TTL found. (Best for cache hit rate)
  #   - "average": Sets all TTLs to the average value.
  #   - "first": Sets all TTLs to the TTL of the first record in the answer.
  #   - "last": Sets all TTLs to the TTL of the last record in the answer.
  ttl_sync_mode: "none"
  
  # --- IP Blocking Behavior ---
  
  # Behavior when an A or AAAA record is matched by an IP/CIDR block rule.
  # Options:
  #   - "filter": (Default) Only the matching A/AAAA record is removed from the answer. Other records are passed through.
  #   - "block": If any A or AAAA record in the response matches a block rule, the entire DNS response is blocked
  #              (returns block_rcode or block_ip).
  ip_block_mode: "filter"

  # DNS Response Code sent when a query is blocked (if no IP injection occurs).
  # This is the default action if no IP injection is configured or if the query type is not A/AAAA.
  # Options: "REFUSED", "NXDOMAIN", "NOERROR", "SERVFAIL".
  block_rcode: "REFUSED"
  
  # TTL (seconds) assigned to synthetic blocked responses (for caching the block).
  block_ttl: 60
  
  # IP Injection for blocks (Sinkholing).
  # Used ONLY when blocking A or AAAA queries.
  # - "NULL": Returns 0.0.0.0 (IPv4) or :: (IPv6). This is the modern standard.
  # - "10.0.0.1": Returns a custom IP (e.g., a block page server).
  # - (Empty/Missing): Returns only the block_rcode.
  block_ip: "NULL"
  
  # Global Answer Matching.
  # If true, applies ALL standard domain/regex blocklists against CNAME targets
  # and IPs found in the answer section (Maximum security).
  match_answers_globally: false

# =============================================================================
# 7. CLIENT GROUPS & IDENTIFICATION
# =============================================================================
# Interval (seconds) to refresh system ARP/Neighbor tables for MAC resolution.
mac_cache_refresh_interval: 300

groups:
  # Client identifiers are checked in the following priority order:
  # 1. Server IP (Destination IP)
  # 2. Server Port (Destination Port)
  # 3. MAC Address (EDNS MAC > ARP Lookup)
  # 4. Client IP (ECS IP > Source IP)
  # 5. Client CIDR
  
  kids_devices:
    # Matchers:
    - "192.168.1.50"               # Client IP Match
    - "server_ip:192.168.1.250"    # Server IP Match (If query hits this specific interface IP)
    - "server_port:5353"           # Server Port Match (If query hits port 5353)
    - "00:11:22:AA:BB:CC"          # MAC Address Match (Case-insensitive)

  guest_network:
    - "192.168.2.0/24"             # CIDR Match
    - "server_ip:172.16.1.1"

# =============================================================================
# 8. SCHEDULES
# Schedules define time windows that trigger policy overrides.
# =============================================================================
schedules:
  # The schedule definition is a list of blocks, allowing multiple time ranges per schedule name.
  bedtime:
    - { days: ["Mon", "Tue", "Wed", "Thu", "Sun"], start: "21:00", end: "07:00" } # Overnight supported
  
  school_hours:
    - { days: ["Mon", "Tue", "Wed", "Thu", "Fri"], start: "08:30", end: "15:30" }

# =============================================================================
# 9. POLICY ASSIGNMENTS
# Link defined groups to filtering policies and schedules.
# =============================================================================
assignments:
  kids_devices:
    policy: "StrictPolicy"       # Default policy when schedule is inactive.
    schedule: "bedtime"          # Schedule to check.
    schedule_policy: "BLOCK"     # Policy override when 'bedtime' is active.
                                 # Can be a policy name, or built-in "BLOCK" / "ALLOW".
  
  guest_network:
    policy: "GuestPolicy"

# =============================================================================
# 10. FILTER LISTS & CATEGORIZATION
# =============================================================================
categories_file: "categories.json"

lists:
  # Source definition is a list of strings OR dictionaries.
  ads_basic:
    - source: "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
      # Policy for domains extracted from HOSTS file (IPs 0.0.0.0/127.0.0.1)
      # Options: "exact", "inclusive" (.domain), "exclusive" (*.domain)
      hosts_domain_type: "inclusive"
  
  custom_block:
    - "./my_blocklist.txt"
  custom_allow:
    - "./my_allowlist.txt"

# =============================================================================
# 11. POLICIES
# Combine lists, type filters, and category rules into one named ruleset.
# =============================================================================
policies:
  StrictPolicy:
    # UPSTREAM ROUTING: Route queries for this policy to a specific upstream group.
    # Default is the 'Default' group defined under upstream.groups.
    upstream_group: "Filtered"
    
    # Allow Lists (Checked first - overrides Block Lists)
    allow:
      - "custom_allow"
    
    # Block Lists
    block:
      - "ads_basic"
      - "custom_block"
    
    # --- Record Type Filtering ---
    # Only allowed types will be processed; all others are blocked.
    allowed_types: 
      - "A"
      - "AAAA"
      - "CNAME"
      - "HTTPS"
      - "SRV"
    
    # --- Category Filtering ---
    # Requires categorization_enabled: true
    category_rules:
      gambling:
        min_confidence: 85   # Minimum percentage certainty required to block
        action: "BLOCK"      # Action if threshold is met ("BLOCK" or "ALLOW")
      social_media:
        min_confidence: 60
        action: "BLOCK"
      
  GuestPolicy:
    block:
      - "ads_basic"
    # Blacklist of Record Types. Only these specific types are blocked.
    blocked_types:
      - "TXT"
      - "ANY"
      - "NULL"

