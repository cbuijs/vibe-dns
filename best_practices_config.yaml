# -----------------------------------------------------------------------------
# Filtering DNS Server - Best Practices Configuration
# -----------------------------------------------------------------------------

logging:
  level: "INFO"
  enable_console: true
  enable_file: true
  file_path: "/var/log/dns_server.log"
  enable_syslog: true
  syslog_address: "/dev/log"

server:
  # Bind to all interfaces for maximum reachability
  bind_ip: 
    - "0.0.0.0"
    - "::"
  
  port_udp: 53
  port_tcp: 53
  
  # Strict validation prevents unauthorized use of DoT/DoH endpoints
  listener_validation: "drop"

  # DoT/DoH enabled for modern, encrypted DNS support
  dot_enabled: true
  port_dot: 853
  tls_cert_file: "/etc/ssl/certs/dns_server.crt"
  tls_key_file: "/etc/ssl/private/dns_server.key"
  dot_server_names: 
    - "dns.home.arpa"

  doh_enabled: true
  port_doh: 443
  doh_server_names:
    - "dns.home.arpa"
  doh_paths: 
    - "/dns-query"

upstream:
  # reliable, privacy-focused upstreams
  servers:
    - "tls://1.1.1.1:853#1.1.1.1"        # Cloudflare DoT
    - "tls://dns.quad9.net:853#9.9.9.9"  # Quad9 DoT
  
  # Frequent monitoring for fast failover
  monitor_interval: 30
  monitor_on_query: false

cache:
  size: 50000                # Large cache for performance
  gc_interval: 300
  prefetch_margin: 15        # Refresh items 15s before they die
  prefetch_min_hits: 2       # Only prefetch items requested at least twice
  negative_ttl: 60           # Cache failures briefly to recover quickly

deduplication:
  enabled: true              # Critical for high-load environments

rate_limit:
  enabled: true
  window_seconds: 60
  ipv4_mask: 32              # Rate limit per individual IP (stricter)
  udp_threshold: 100         # Force TCP for floods
  total_threshold: 500       # Drop extreme abuse

response:
  round_robin_enabled: true  # Load balance between IPs if upstream provides multiple
  cname_collapse: true       # Simplify answers
  minimize_response: true    # Reduce packet size (strip Authority section)
  min_ttl: 300               # Enforce 5 min minimum caching for better performance
  max_ttl: 86400             # Cap at 1 day
  
  block_rcode: "NOERROR"     # Return NOERROR...
  block_ip: "NULL"           # ...with 0.0.0.0 IP. This is often cleaner for client apps than REFUSED.
  match_answers_globally: true # High Security: Check CNAME targets against blocklists too.

# -----------------------------------------------------------------------------
# CLIENTS & POLICIES
# -----------------------------------------------------------------------------

mac_cache_refresh_interval: 60 # Fast MAC resolution updates
list_refresh_interval: 43200   # Refresh lists every 12 hours

lists:
  # Standard Ad/Malware lists
  ads_basic:
    - "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
    hosts_domain_type: "inclusive" # Options: "exact", "inclusive", "exclusive"

  # Custom local allowlist for false positives
  whitelist:
    - "./lists/whitelist.txt"

groups:
  kids_devices:
    - "192.168.1.50"         # Gaming PC
    - "192.168.1.51"         # Tablet
  iot_devices:
    - "192.168.1.100/28"     # IoT VLAN Range

schedules:
  bedtime:
    days: ["Sun", "Mon", "Tue", "Wed", "Thu"]
    slots:
      - { start: "21:00", end: "07:00" } # 9 PM to 7 AM

assignments:
  kids_devices:
    policy: "FamilySafe"
    schedule: "bedtime"
    schedule_policy: "BLOCK"
  
  iot_devices:
    policy: "Hardened"

policies:
  # Default Policy (Implicitly applied to unknown clients)
  Default:
    allow: ["whitelist"]
    block: ["ads_basic"]
  
  # Kids Policy
  FamilySafe:
    allow: ["whitelist"]
    block: ["ads_basic"]
    # Block encrypted DNS bypass attempts and raw IPs
    blocked_types: ["HTTPS", "SVCB"] 

  # IoT Policy (Lock down weird stuff)
  Hardened:
    block: ["ads_basic"]
    # Block everything except standard A/AAAA queries
    allowed_types: ["A", "AAAA", "SRV"]


